name: Build and Release SCRDESK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install dependencies
        run: |
          brew install opus yasm cmake nasm pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build SCRDESK
        run: |
          python3 build.py --flutter

      - name: Create DMG
        run: |
          # Package the app into DMG
          cd flutter/build/macos/Build/Products/Release
          hdiutil create -volname "SCRDESK" -srcfolder SCRDESK.app -ov -format UDZO SCRDESK-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrdesk-macos
          path: flutter/build/macos/Build/Products/Release/SCRDESK-macos.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install dependencies
        run: |
          choco install llvm -y

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build SCRDESK
        run: |
          python build.py --flutter

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrdesk-windows
          path: |
            flutter/build/windows/runner/Release/*.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxdo-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxtst-dev \
            libva-dev \
            libvdpau-dev \
            libpulse-dev \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libopus-dev \
            yasm \
            cmake \
            nasm \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build SCRDESK
        run: |
          python3 build.py --flutter

      - name: Create AppImage
        run: |
          # Download linuxdeploy
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Create AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable flutter/build/linux/x64/release/bundle/scrdesk \
            --desktop-file res/scrdesk.desktop \
            --icon-file res/icon.png \
            --output appimage || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrdesk-linux
          path: |
            SCRDESK*.AppImage

  create-release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            scrdesk-macos/*.dmg
            scrdesk-windows/*.exe
            scrdesk-linux/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
